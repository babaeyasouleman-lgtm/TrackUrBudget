<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F7F7F9">
  <title>Mon Budget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #F7F7F9; }
    #root { height: 100%; width: 100%; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
      padding-bottom: calc(1rem + var(--safe-bottom));
      pointer-events: none;
    }
    .nav-inner {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
    }
    .main-scroll {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(7rem + var(--safe-bottom));
    }
    .chart-container { position: relative; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const Icon = ({ name, className = "", strokeWidth = 2 }) => {
      const nodes = (lucide.icons || lucide)[name];
      if (!nodes || !Array.isArray(nodes)) return null;
      const inner = nodes.map(([tag, attrs]) =>
        `<${tag} ${Object.entries(attrs||{}).map(([k,v])=>`${k}="${v}"`).join(' ')}/>`
      ).join('');
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" class="${className}">${inner}</svg>`;
      return <span dangerouslySetInnerHTML={{ __html: svg }} style={{ display: 'contents' }} />;
    };

    const DEFAULT_CATEGORIES = [
      { id: '2',  name: 'Loyer',           type: 'Fixe',     defaultSplit: 400, hex: '#1e293b', light: 'bg-slate-100 text-slate-800' },
      { id: '3',  name: 'Épicerie',         type: 'Fixe',     defaultSplit: 125, hex: '#3b82f6', light: 'bg-blue-50 text-blue-700' },
      { id: '4',  name: 'Abonnements',      type: 'Fixe',     defaultSplit: 50,  hex: '#60a5fa', light: 'bg-blue-50 text-blue-700' },
      { id: '5',  name: 'Transport',        type: 'Fixe',     defaultSplit: 50,  hex: '#93c5fd', light: 'bg-blue-50 text-blue-700' },
      { id: '6',  name: 'Restaurants',      type: 'Variable', defaultSplit: 75,  hex: '#f43f5e', light: 'bg-rose-50 text-rose-700' },
      { id: '7',  name: 'Achats divers',    type: 'Variable', defaultSplit: 50,  hex: '#f97316', light: 'bg-orange-50 text-orange-700' },
      { id: '9',  name: 'Loisirs & Sorties',type: 'Variable', defaultSplit: 50,  hex: '#8b5cf6', light: 'bg-violet-50 text-violet-700' },
      { id: '10', name: "Fonds d'urgence",  type: 'Épargne',  defaultSplit: 150, hex: '#7c3aed', light: 'bg-violet-50 text-violet-700' },
      { id: '11', name: 'Investissement',   type: 'Épargne',  defaultSplit: 50,  hex: '#059669', light: 'bg-emerald-50 text-emerald-700' },
    ];

    const PALETTE = [
      { hex: '#ef4444', light: 'bg-red-50 text-red-700' },
      { hex: '#f97316', light: 'bg-orange-50 text-orange-700' },
      { hex: '#f59e0b', light: 'bg-amber-50 text-amber-700' },
      { hex: '#84cc16', light: 'bg-lime-50 text-lime-700' },
      { hex: '#10b981', light: 'bg-emerald-50 text-emerald-700' },
      { hex: '#06b6d4', light: 'bg-cyan-50 text-cyan-700' },
      { hex: '#3b82f6', light: 'bg-blue-50 text-blue-700' },
      { hex: '#8b5cf6', light: 'bg-violet-50 text-violet-700' },
      { hex: '#ec4899', light: 'bg-pink-50 text-pink-700' },
      { hex: '#64748b', light: 'bg-slate-50 text-slate-700' },
    ];

    const ls = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    const ConfirmDeleteButton = ({ onDelete }) => {
      const [c, setC] = useState(false);
      if (c) return <button onClick={onDelete} className="text-[10px] font-bold bg-rose-500 text-white px-2 py-1.5 rounded-lg active:scale-95">Confirmer</button>;
      return <button type="button" onClick={() => setC(true)} className="p-1.5 text-slate-300 hover:text-rose-500 rounded-lg"><Icon name="Trash2" className="w-4 h-4" /></button>;
    };

    const DonutChart = ({ data, totalSpent }) => {
      const safe = Number(totalSpent) || 0;
      let cum = 0;
      if (safe <= 0) return (
        <div className="relative w-44 h-44 mx-auto flex items-center justify-center">
          <svg viewBox="0 0 42 42" className="w-full h-full -rotate-90">
            <circle cx="21" cy="21" r="15.9" fill="transparent" stroke="#f1f5f9" strokeWidth="4"/>
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="text-xl font-light text-slate-400">$0</span>
            <span className="text-[9px] uppercase tracking-widest text-slate-400 font-bold mt-1">Dépensé</span>
          </div>
        </div>
      );
      return (
        <div className="relative w-44 h-44 mx-auto">
          <svg viewBox="0 0 42 42" className="w-full h-full -rotate-90">
            <circle cx="21" cy="21" r="15.9" fill="transparent" stroke="#f8fafc" strokeWidth="5"/>
            {data.map(s => {
              const amt = Number(s.amount) || 0; if (!amt) return null;
              const pct = (amt / safe) * 100;
              const da = `${pct} ${100 - pct}`;
              const off = 100 - cum; cum += pct;
              return <circle key={s.id} cx="21" cy="21" r="15.9" fill="transparent" stroke={s.hex||'#ccc'} strokeWidth="5" strokeDasharray={da} strokeDashoffset={off}/>;
            })}
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="text-xl font-bold text-slate-900">${safe.toFixed(0)}</span>
            <span className="text-[9px] uppercase tracking-widest text-slate-400 font-bold mt-1">Dépensé</span>
          </div>
        </div>
      );
    };

    // ── CHART: Épargne 6 mois ──────────────────────────────────────────
    const SavingsChart = ({ allocations, transactions, categories }) => {
      const ref = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        const savings = categories.filter(c => c.type === 'Épargne');
        const months = [];
        const now = new Date();
        for (let i = 5; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          months.push(d.toISOString().slice(0, 7));
        }
        const labels = months.map(m => {
          const [y, mo] = m.split('-');
          return new Date(+y, +mo - 1, 1).toLocaleString('fr-CA', { month: 'short' });
        });
        // cumulative savings balance per month
        const data = months.map((_, idx) => {
          const pastMonths = months.slice(0, idx + 1);
          let bal = 0;
          allocations.forEach(a => {
            if (pastMonths.includes(a.month) && a.splits) {
              savings.forEach(s => { bal += parseFloat(a.splits[s.id] || 0); });
            }
          });
          transactions.forEach(t => {
            const mo = String(t.date).slice(0, 7);
            if (pastMonths.includes(mo) && savings.find(s => s.id === t.categoryId)) {
              bal -= parseFloat(t.amount || 0);
            }
          });
          return Math.max(0, bal);
        });

        if (chartRef.current) { chartRef.current.destroy(); }
        const ctx = ref.current.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 160);
        grad.addColorStop(0, 'rgba(124,58,237,0.25)');
        grad.addColorStop(1, 'rgba(124,58,237,0)');
        chartRef.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data,
              borderColor: '#7c3aed',
              backgroundColor: grad,
              borderWidth: 2.5,
              pointBackgroundColor: '#7c3aed',
              pointRadius: 4,
              pointHoverRadius: 6,
              fill: true,
              tension: 0.4,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: {
              callbacks: { label: ctx => ` $${ctx.parsed.y.toFixed(0)}` },
              backgroundColor: '#1e293b', titleColor: '#94a3b8', bodyColor: '#fff',
              padding: 10, cornerRadius: 10,
            }},
            scales: {
              x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } }, border: { display: false } },
              y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => `$${v}` }, border: { display: false } },
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [allocations, transactions, categories]);

      return (
        <div className="chart-container" style={{ height: 160 }}>
          <canvas ref={ref}></canvas>
        </div>
      );
    };

    // ── CHART: Comparatif dépenses 2 mois ─────────────────────────────
    const CompareChart = ({ transactions, categories, viewMonthPrefix }) => {
      const ref = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        const [y, m] = viewMonthPrefix.split('-').map(Number);
        const prevDate = new Date(y, m - 2, 1);
        const prevPrefix = prevDate.toISOString().slice(0, 7);

        const varCats = categories.filter(c => c.type === 'Variable' || c.type === 'Fixe');
        const labels = varCats.map(c => c.name.length > 8 ? c.name.slice(0, 7) + '…' : c.name);

        const cur = varCats.map(c =>
          transactions.filter(t => String(t.date).startsWith(viewMonthPrefix) && t.categoryId === c.id)
            .reduce((s, t) => s + parseFloat(t.amount || 0), 0)
        );
        const prev = varCats.map(c =>
          transactions.filter(t => String(t.date).startsWith(prevPrefix) && t.categoryId === c.id)
            .reduce((s, t) => s + parseFloat(t.amount || 0), 0)
        );

        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(ref.current.getContext('2d'), {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label: 'Mois précédent', data: prev, backgroundColor: 'rgba(148,163,184,0.4)', borderRadius: 6, borderSkipped: false },
              { label: 'Ce mois', data: cur, backgroundColor: varCats.map((c, i) => cur[i] > prev[i] ? 'rgba(244,63,94,0.75)' : 'rgba(16,185,129,0.75)'), borderRadius: 6, borderSkipped: false },
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top', labels: { color: '#64748b', font: { size: 10 }, boxWidth: 10, padding: 8 } },
              tooltip: {
                callbacks: { label: ctx => ` $${ctx.parsed.y.toFixed(2)}` },
                backgroundColor: '#1e293b', titleColor: '#94a3b8', bodyColor: '#fff', padding: 10, cornerRadius: 10,
              }
            },
            scales: {
              x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } }, border: { display: false } },
              y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 10 }, callback: v => `$${v}` }, border: { display: false } },
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [transactions, categories, viewMonthPrefix]);

      return (
        <div className="chart-container" style={{ height: 170 }}>
          <canvas ref={ref}></canvas>
        </div>
      );
    };

    // ── COACH ALERTS ──────────────────────────────────────────────────
    const generateAlerts = (categories, monthEnvelopes, monthSpent, viewMonthPrefix, allocations, transactions) => {
      const alerts = [];
      const today = new Date();
      const [y, m] = viewMonthPrefix.split('-').map(Number);
      const isCurrentMonth = today.getFullYear() === y && (today.getMonth() + 1) === m;
      if (!isCurrentMonth) return [];

      const dayOfMonth = today.getDate();
      const daysInMonth = new Date(y, m, 0).getDate();
      const monthProgress = dayOfMonth / daysInMonth; // 0–1

      categories.forEach(cat => {
        const alloc = Number(monthEnvelopes[cat.id]) || 0;
        const spent = Number(monthSpent[cat.id]) || 0;
        if (alloc <= 0) return;
        const spentPct = spent / alloc; // 0–1

        if (cat.type === 'Variable' || cat.type === 'Fixe') {
          // Alerte: on a dépensé > (monthProgress * 1.3) → rythme trop élevé
          if (spentPct > monthProgress * 1.3 && spentPct > 0.5) {
            const projectedEnd = (spent / monthProgress).toFixed(0);
            alerts.push({
              type: 'warning',
              cat: cat.name,
              msg: `Tu es à ${Math.round(spentPct * 100)}% de l'enveloppe "${cat.name}" alors qu'on est seulement au ${Math.round(monthProgress * 100)}% du mois. À ce rythme tu vas dépenser ~$${projectedEnd} ce mois-ci.`,
              icon: 'TrendingUp',
            });
          }
          // Alerte: dépassement
          if (spent > alloc) {
            alerts.push({
              type: 'danger',
              cat: cat.name,
              msg: `L'enveloppe "${cat.name}" est dépassée de $${(spent - alloc).toFixed(2)}. Pense à te couvrir depuis une autre enveloppe.`,
              icon: 'AlertTriangle',
            });
          }
          // Bravo: bien sous contrôle en fin de mois
          if (monthProgress > 0.75 && spentPct < 0.5 && spent > 0) {
            alerts.push({
              type: 'success',
              cat: cat.name,
              msg: `Bravo ! Tu es à seulement ${Math.round(spentPct * 100)}% de ton budget "${cat.name}" malgré que le mois tire à sa fin. Belle maîtrise !`,
              icon: 'Award',
            });
          }
        }

        if (cat.type === 'Épargne') {
          // Compare to last month savings
          const prevDate = new Date(y, m - 2, 1);
          const prevPrefix = prevDate.toISOString().slice(0, 7);
          const prevAllocs = allocations.filter(a => a.month === prevPrefix);
          let prevSaved = 0;
          prevAllocs.forEach(a => { prevSaved += parseFloat(a.splits?.[cat.id] || 0); });
          if (prevSaved > 0 && alloc > prevSaved * 1.1) {
            alerts.push({
              type: 'success',
              cat: cat.name,
              msg: `Tu as épargné $${alloc.toFixed(0)} dans "${cat.name}" ce mois-ci, soit $${(alloc - prevSaved).toFixed(0)} de plus que le mois dernier. Continue comme ça !`,
              icon: 'TrendingUp',
            });
          }
        }
      });

      // Global: si aucune dépense saisie après 10 jours
      const totalSpent = Object.values(monthSpent).reduce((a, b) => a + b, 0);
      if (dayOfMonth > 10 && totalSpent === 0) {
        alerts.push({
          type: 'info',
          cat: null,
          msg: 'Tu n\'as aucune dépense saisie ce mois-ci. N\'oublie pas de renseigner tes transactions pour que le Coach puisse t\'aider !',
          icon: 'Info',
        });
      }

      return alerts.slice(0, 5); // max 5 alertes
    };

    // ══════════════════════════════════════════════════════════════════
    //  APP
    // ══════════════════════════════════════════════════════════════════
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [viewDate, setViewDate] = useState(new Date());

      const goToPrevMonth = () => setViewDate(d => new Date(d.getFullYear(), d.getMonth() - 1, 1));
      const goToNextMonth = () => setViewDate(d => new Date(d.getFullYear(), d.getMonth() + 1, 1));
      const goToCurrentMonth = () => setViewDate(new Date());

      const [customCategories, setCustomCategories] = useState(() => ls.get('fintech_categories', DEFAULT_CATEGORIES));
      const [transactions,     setTransactions]     = useState(() => ls.get('fintech_transactions', []));
      const [allocations,      setAllocations]      = useState(() => ls.get('fintech_allocations', []));
      const [transfers,        setTransfers]        = useState(() => ls.get('fintech_transfers', []));
      const [userTemplate,     setUserTemplate]     = useState(() => ls.get('fintech_template', {}));
      const [userGoals,        setUserGoals]        = useState(() => ls.get('fintech_goals', { '10': 10000, '11': 25000 }));
      const [fixedExpenses,    setFixedExpenses]    = useState(() => ls.get('fintech_fixed_expenses', []));

      // Persist on every change
      useEffect(() => ls.set('fintech_categories',     customCategories), [customCategories]);
      useEffect(() => ls.set('fintech_transactions',   transactions),     [transactions]);
      useEffect(() => ls.set('fintech_allocations',    allocations),      [allocations]);
      useEffect(() => ls.set('fintech_transfers',      transfers),        [transfers]);
      useEffect(() => ls.set('fintech_template',       userTemplate),     [userTemplate]);
      useEffect(() => ls.set('fintech_goals',          userGoals),        [userGoals]);
      useEffect(() => ls.set('fintech_fixed_expenses', fixedExpenses),    [fixedExpenses]);

      // Fix string splits
      useEffect(() => {
        let dirty = false;
        const fixed = allocations.map(a => {
          if (!a.splits) return a;
          const s = {}; let changed = false;
          Object.entries(a.splits).forEach(([k, v]) => { if (typeof v === 'string') { s[k] = parseFloat(v)||0; changed = true; dirty = true; } else s[k] = v; });
          return changed ? { ...a, splits: s } : a;
        });
        if (dirty) setAllocations(fixed);
      }, []);

      const activeTemplate = customCategories.map(c => ({
        ...c,
        defaultSplit: userTemplate[c.id] !== undefined ? (parseFloat(userTemplate[c.id]) || 0) : (c.defaultSplit || 0),
      }));

      // All-time balances (for patrimoine)
      const allTimeEnv = {}; const allTimeSpent = {};
      activeTemplate.forEach(c => { allTimeEnv[c.id] = 0; allTimeSpent[c.id] = 0; });
      allocations.forEach(a => a.splits && Object.entries(a.splits).forEach(([k, v]) => { if (allTimeEnv[k] !== undefined) allTimeEnv[k] += parseFloat(v)||0; }));
      transfers.forEach(t => {
        if (allTimeEnv[t.fromCategoryId] !== undefined) allTimeEnv[t.fromCategoryId] -= parseFloat(t.amount)||0;
        if (allTimeEnv[t.toCategoryId]   !== undefined) allTimeEnv[t.toCategoryId]   += parseFloat(t.amount)||0;
      });
      transactions.forEach(t => { if (allTimeSpent[t.categoryId] !== undefined) allTimeSpent[t.categoryId] += parseFloat(t.amount)||0; });

      const urgId  = customCategories.find(c => c.name.toLowerCase().includes('urgence'))?.id || '10';
      const invId  = customCategories.find(c => c.name.toLowerCase().includes('invest'))?.id  || '11';
      const totalUrgence = (allTimeEnv[urgId]||0) - (allTimeSpent[urgId]||0);
      const totalInvest  = (allTimeEnv[invId]||0) - (allTimeSpent[invId]||0);

      // Current month balances
      const vmp = viewDate.toISOString().slice(0, 7);
      const curAllocs = allocations.filter(a => a.month === vmp);
      const curTxs    = transactions.filter(t => String(t.date).startsWith(vmp));
      const curTrans  = transfers.filter(t => t.month === vmp);

      const monthEnv = {}; const monthSpent = {};
      activeTemplate.forEach(c => { monthEnv[c.id] = 0; monthSpent[c.id] = 0; });
      curAllocs.forEach(a => a.splits && Object.entries(a.splits).forEach(([k, v]) => { if (monthEnv[k] !== undefined) monthEnv[k] += parseFloat(v)||0; }));
      curTrans.forEach(t => {
        if (monthEnv[t.fromCategoryId] !== undefined) monthEnv[t.fromCategoryId] -= parseFloat(t.amount)||0;
        if (monthEnv[t.toCategoryId]   !== undefined) monthEnv[t.toCategoryId]   += parseFloat(t.amount)||0;
      });
      curTxs.forEach(t => { if (monthSpent[t.categoryId] !== undefined) monthSpent[t.categoryId] += parseFloat(t.amount)||0; });

      const coachAlerts = generateAlerts(activeTemplate, monthEnv, monthSpent, vmp, allocations, transactions);

      // ── ADD VIEW ───────────────────────────────────────────────────
      const AddTransactionView = () => {
        const [mode, setMode] = useState('expense');
        // Expense
        const [amt, setAmt]   = useState('');
        const [catId, setCatId] = useState(customCategories.filter(c => c.type !== 'Épargne')[0]?.id || '');
        const [desc, setDesc]  = useState('');
        const [date, setDate]  = useState(new Date().toISOString().split('T')[0]);
        const [coverId, setCoverId] = useState('');
        const [err, setErr]    = useState('');
        // Payday
        const [payAmt, setPayAmt] = useState('');
        const [payDate, setPayDate] = useState(new Date().toISOString().split('T')[0]);
        const [splits, setSplits] = useState({});
        // Income ponctuel
        const [incAmt, setIncAmt]   = useState('');
        const [incCat, setIncCat]   = useState(customCategories[0]?.id || '');
        const [incDesc, setIncDesc] = useState('');
        const [incDate, setIncDate] = useState(new Date().toISOString().split('T')[0]);

        const expVal  = parseFloat(amt) || 0;
        const avail   = (monthEnv[catId]||0) - (monthSpent[catId]||0);
        const shortfall = expVal > avail ? expVal - Math.max(0, avail) : 0;
        const needsCover = shortfall > 0;

        const handleExpense = e => {
          e.preventDefault();
          if (!amt || !catId) return;
          if (needsCover && !coverId) { setErr('Choisis une enveloppe de secours.'); return; }
          setErr('');
          const tx = { id: Date.now().toString(), date, amount: parseFloat(amt), categoryId: catId, description: desc, createdAt: new Date().toISOString() };
          setTransactions(p => [...p, tx].sort((a, b) => new Date(b.date) - new Date(a.date)));
          if (needsCover) setTransfers(p => [...p, { id: (Date.now()+1).toString(), date, month: date.slice(0,7), fromCategoryId: coverId, toCategoryId: catId, amount: shortfall, createdAt: new Date().toISOString() }]);
          setViewDate(new Date(date)); setAmt(''); setDesc(''); setCoverId(''); setActiveTab('dashboard');
        };

        const applyTemplate = () => {
          const s = {}; activeTemplate.forEach(c => s[c.id] = c.defaultSplit || 0); setSplits(s);
        };
        const totalAlloc = Object.values(splits).reduce((s, v) => s + (parseFloat(v)||0), 0);
        const leftToAlloc = (parseFloat(payAmt)||0) - totalAlloc;

        const handlePayday = e => {
          e.preventDefault();
          const inc = parseFloat(payAmt); if (!inc || isNaN(inc)) return;
          const ps = {}; let tot = 0;
          Object.entries(splits).forEach(([k, v]) => { const n = parseFloat(v)||0; ps[k] = n; tot += n; });
          if (Math.abs(inc - tot) > 0.01) { setErr("Répartis l'intégralité de la paie."); return; }
          setErr('');
          setAllocations(p => [...p, { id: Date.now().toString(), date: payDate, month: payDate.slice(0,7), totalIncome: inc, splits: ps, createdAt: new Date().toISOString() }]);
          setViewDate(new Date(payDate)); setPayAmt(''); setSplits({}); setActiveTab('dashboard');
        };

        const handleIncome = e => {
          e.preventDefault();
          if (!incAmt || !incCat) return;
          // Revenu ponctuel = injection directe dans une enveloppe via allocation
          const ps = {}; ps[incCat] = parseFloat(incAmt);
          setAllocations(p => [...p, { id: Date.now().toString(), date: incDate, month: incDate.slice(0,7), totalIncome: parseFloat(incAmt), splits: ps, isPonctuel: true, description: incDesc, createdAt: new Date().toISOString() }]);
          setViewDate(new Date(incDate)); setIncAmt(''); setIncDesc(''); setActiveTab('dashboard');
        };

        const handleFixed = fe => {
          const today = new Date().toISOString().split('T')[0];
          setTransactions(p => [...p, { id: Date.now().toString(), date: today, amount: parseFloat(fe.amount)||0, categoryId: fe.categoryId, description: `[Fixe] ${fe.name}`, isFixed: true, fixedId: fe.id, createdAt: new Date().toISOString() }].sort((a,b) => new Date(b.date)-new Date(a.date)));
          setViewDate(new Date(today));
        };

        const tabs = [
          { id: 'expense', label: 'Dépense' },
          { id: 'payday',  label: 'Paie' },
          { id: 'income',  label: 'Revenu +' },
          { id: 'fixed',   label: '⚡ Fixes' },
        ];

        return (
          <div className="h-full flex flex-col">
            <div className="pt-12 px-5 pb-3 shrink-0">
              <div className="bg-slate-100 p-1 rounded-2xl flex gap-1">
                {tabs.map(t => (
                  <button key={t.id} onClick={() => { setMode(t.id); setErr(''); }} className={`flex-1 py-2 rounded-xl text-[10px] uppercase tracking-wide font-bold transition-all ${mode === t.id ? 'bg-white shadow text-slate-900' : 'text-slate-400'}`}>{t.label}</button>
                ))}
              </div>
            </div>

            {/* ── DÉPENSE ── */}
            {mode === 'expense' && (
              <form onSubmit={handleExpense} className="flex-1 overflow-y-auto hide-scrollbar px-5 pb-6 space-y-4">
                <div className="flex justify-center items-center py-4">
                  <span className="text-3xl text-slate-300 font-light mr-1">$</span>
                  <input type="number" step="0.01" inputMode="decimal" value={amt} onChange={e=>setAmt(e.target.value)} className="w-full text-6xl font-light text-slate-800 bg-transparent outline-none text-center placeholder-slate-200" placeholder="0.00" required />
                </div>
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                  <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Enveloppe</label>
                  <select value={catId} onChange={e=>{setCatId(e.target.value);setCoverId('');}} className="w-full bg-transparent text-slate-800 font-medium text-base outline-none">
                    {activeTemplate.filter(c=>c.type!=='Épargne').map(c=>(
                      <option key={c.id} value={c.id}>{c.name} (Dispo: ${((monthEnv[c.id]||0)-(monthSpent[c.id]||0)).toFixed(2)})</option>
                    ))}
                  </select>
                </div>
                {needsCover && (
                  <div className="bg-rose-50 rounded-2xl p-4 border border-rose-200">
                    <p className="text-xs font-bold text-rose-700 mb-2 flex items-center"><Icon name="ArrowRightLeft" className="w-3.5 h-3.5 mr-1.5"/>Il manque ${shortfall.toFixed(2)} — quelle enveloppe te couvre ?</p>
                    <select value={coverId} onChange={e=>setCoverId(e.target.value)} className="w-full bg-white text-rose-900 text-sm p-2.5 rounded-xl border border-rose-100 outline-none">
                      <option value="" disabled>Choisir...</option>
                      {activeTemplate.filter(c=>c.id!==catId&&c.type!=='Épargne').map(c=>(
                        <option key={c.id} value={c.id}>{c.name} (${((monthEnv[c.id]||0)-(monthSpent[c.id]||0)).toFixed(2)})</option>
                      ))}
                    </select>
                  </div>
                )}
                <input type="text" value={desc} onChange={e=>setDesc(e.target.value)} className="w-full bg-white rounded-2xl p-4 border border-slate-100 text-slate-800 font-medium outline-none placeholder-slate-300 shadow-sm" placeholder="Note (ex: Tim Hortons…)" />
                <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-white rounded-2xl p-4 border border-slate-100 text-slate-800 font-medium outline-none shadow-sm" />
                {err && <p className="text-rose-600 text-sm font-bold text-center">{err}</p>}
                <button type="submit" disabled={needsCover&&!coverId} className={`w-full rounded-2xl py-4 text-base font-bold transition-all ${needsCover&&!coverId?'bg-slate-200 text-slate-400':'bg-slate-900 text-white shadow-lg active:scale-[0.98]'}`}>
                  {needsCover ? 'Valider & Transférer' : 'Ajouter la dépense'}
                </button>
              </form>
            )}

            {/* ── PAIE ── */}
            {mode === 'payday' && (
              <form onSubmit={handlePayday} className="flex-1 overflow-y-auto hide-scrollbar pb-6">
                <div className="px-5 py-4">
                  <div className="flex justify-center items-center mb-4">
                    <span className="text-3xl text-emerald-300 font-light mr-1">+$</span>
                    <input type="number" step="0.01" inputMode="decimal" value={payAmt} onChange={e=>{setPayAmt(e.target.value);setErr('');}} className="w-full text-5xl font-light text-emerald-600 bg-transparent outline-none text-center placeholder-emerald-200" placeholder="Montant" required />
                  </div>
                  <div className={`p-3 rounded-2xl flex justify-between items-center ${Math.abs(leftToAlloc)<0.01?'bg-emerald-100 text-emerald-800':leftToAlloc>0?'bg-amber-100 text-amber-800':'bg-rose-100 text-rose-800'}`}>
                    <span className="font-bold text-sm">À répartir :</span>
                    <span className="text-xl font-black">${(leftToAlloc||0).toFixed(2)}</span>
                  </div>
                  {err && <p className="text-rose-600 text-sm font-bold mt-2 text-center">{err}</p>}
                  {Object.keys(splits).length === 0 && (
                    <button type="button" onClick={applyTemplate} className="mt-3 w-full bg-white border-2 border-dashed border-slate-300 text-slate-600 font-bold py-3 rounded-2xl flex items-center justify-center">
                      <Icon name="Split" className="w-4 h-4 mr-2"/>Appliquer mon modèle type
                    </button>
                  )}
                  <input type="date" value={payDate} onChange={e=>setPayDate(e.target.value)} className="mt-3 w-full bg-white rounded-2xl p-3 border border-slate-100 text-slate-800 font-medium outline-none shadow-sm" />
                </div>
                {Object.keys(splits).length > 0 && (
                  <div className="px-5 space-y-2">
                    {activeTemplate.map(cat => (
                      <div key={cat.id} className="bg-white rounded-2xl p-3 border border-slate-50 flex justify-between items-center shadow-sm">
                        <div className="flex items-center">
                          <div className={`w-6 h-6 rounded-full flex items-center justify-center mr-2 ${cat.light||'bg-slate-100'}`}><span className="text-[10px] font-bold">{cat.name.charAt(0)}</span></div>
                          <span className="font-semibold text-slate-700 text-sm w-24 truncate">{cat.name}</span>
                        </div>
                        <div className="relative w-28">
                          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
                          <input type="number" inputMode="decimal" value={splits[cat.id] !== undefined ? splits[cat.id] : ''} onChange={e=>{setSplits({...splits,[cat.id]:e.target.value});setErr('');}} className="w-full bg-slate-50 border border-slate-100 rounded-xl py-1.5 pl-6 pr-2 text-right font-bold text-slate-900 outline-none focus:border-emerald-500"/>
                        </div>
                      </div>
                    ))}
                    <button type="submit" className={`w-full rounded-2xl py-4 text-base font-bold mt-2 transition-all ${Math.abs(leftToAlloc)>0.01?'bg-slate-200 text-slate-400':'bg-emerald-600 text-white shadow-lg active:scale-[0.98]'}`}>
                      {Math.abs(leftToAlloc)>0.01?'Répartis la totalité':'Valider les enveloppes'}
                    </button>
                  </div>
                )}
              </form>
            )}

            {/* ── REVENU PONCTUEL ── */}
            {mode === 'income' && (
              <form onSubmit={handleIncome} className="flex-1 overflow-y-auto hide-scrollbar px-5 pb-6 space-y-4">
                <div className="flex justify-center items-center py-4">
                  <span className="text-3xl text-emerald-300 font-light mr-1">+$</span>
                  <input type="number" step="0.01" inputMode="decimal" value={incAmt} onChange={e=>setIncAmt(e.target.value)} className="w-full text-6xl font-light text-emerald-600 bg-transparent outline-none text-center placeholder-emerald-200" placeholder="0.00" required />
                </div>
                <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-3 text-xs text-emerald-700 font-medium flex items-start">
                  <Icon name="Info" className="w-4 h-4 mr-2 shrink-0 mt-0.5"/>
                  Cadeau, bonus, remboursement… injecte ce montant directement dans une enveloppe de ton choix, sans toucher à ton modèle de paie.
                </div>
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                  <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Déposer dans</label>
                  <select value={incCat} onChange={e=>setIncCat(e.target.value)} className="w-full bg-transparent text-slate-800 font-medium text-base outline-none">
                    {activeTemplate.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <input type="text" value={incDesc} onChange={e=>setIncDesc(e.target.value)} className="w-full bg-white rounded-2xl p-4 border border-slate-100 text-slate-800 font-medium outline-none placeholder-slate-300 shadow-sm" placeholder="Note (ex: Cadeau d'anniversaire…)" />
                <input type="date" value={incDate} onChange={e=>setIncDate(e.target.value)} className="w-full bg-white rounded-2xl p-4 border border-slate-100 text-slate-800 font-medium outline-none shadow-sm" />
                <button type="submit" className="w-full rounded-2xl py-4 text-base font-bold bg-emerald-600 text-white shadow-lg active:scale-[0.98]">
                  Ajouter ce revenu
                </button>
              </form>
            )}

            {/* ── FIXES ── */}
            {mode === 'fixed' && (
              <div className="flex-1 overflow-y-auto hide-scrollbar px-5 pb-6">
                <p className="text-sm text-slate-500 mb-4 mt-2">Valide tes charges fixes en un clic.</p>
                {fixedExpenses.length === 0 ? (
                  <div className="text-center p-6 bg-white rounded-2xl border border-dashed border-slate-200 text-slate-500 text-sm">Aucune charge fixe configurée. Va dans les Paramètres.</div>
                ) : fixedExpenses.map(fe => {
                  const isPaid = curTxs.some(t => t.isFixed && t.fixedId === fe.id);
                  const cat = activeTemplate.find(c => c.id === fe.categoryId);
                  return (
                    <div key={fe.id} className="bg-white rounded-2xl p-4 border border-slate-50 flex justify-between items-center mb-2 shadow-sm">
                      <div><p className="font-bold text-slate-800 text-sm">{fe.name}</p><p className="text-xs text-slate-400">{cat?.name||'—'}</p></div>
                      <div className="flex items-center space-x-3">
                        <span className="font-bold text-slate-900">${(parseFloat(fe.amount)||0).toFixed(2)}</span>
                        {isPaid ? (
                          <div className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-xl text-xs font-bold border border-emerald-100 flex items-center"><Icon name="Check" className="w-3 h-3 mr-1"/>Payé</div>
                        ) : (
                          <button onClick={()=>handleFixed(fe)} className="bg-slate-900 text-white px-4 py-1.5 rounded-xl text-xs font-bold active:scale-95 shadow">Payer</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      // ── DASHBOARD ─────────────────────────────────────────────────
      const DashboardView = () => {
        const [editingTx, setEditingTx] = useState(null);
        const [editForm, setEditForm] = useState({ amount:'', categoryId:'', description:'', date:'' });

        const openEdit = tx => { setEditingTx(tx); setEditForm({ amount:tx.amount, categoryId:tx.categoryId, description:tx.description||'', date:tx.date }); };
        const saveEdit = e => {
          e.preventDefault();
          setTransactions(p => p.map(t => t.id===editingTx.id ? {...t, amount:parseFloat(editForm.amount)||0, categoryId:editForm.categoryId, description:editForm.description, date:editForm.date} : t).sort((a,b)=>new Date(b.date)-new Date(a.date)));
          setEditingTx(null);
        };

        const budgetDep  = activeTemplate.filter(c=>c.type!=='Épargne').reduce((s,c)=>s+(monthEnv[c.id]||0),0);
        const spentDep   = activeTemplate.filter(c=>c.type!=='Épargne').reduce((s,c)=>s+(monthSpent[c.id]||0),0);
        const reste      = budgetDep - spentDep;
        const totalAlloc = Object.values(monthEnv).reduce((a,b)=>a+b,0);
        const epargneAlloc = activeTemplate.filter(c=>c.type==='Épargne').reduce((s,c)=>s+(monthEnv[c.id]||0),0);
        const tauxEpargne  = totalAlloc>0 ? Math.round((epargneAlloc/totalAlloc)*100) : 0;
        const isCurrentMonth = new Date().toISOString().slice(0,7) === vmp;

        const timeline = [
          ...curTxs.map(t=>({...t,_type:'expense'})),
          ...curAllocs.map(a=>({...a,_type:a.isPonctuel?'income':'payday'})),
          ...curTrans.map(t=>({...t,_type:'transfer'})),
        ].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

        const donutData = activeTemplate.filter(c=>c.type!=='Épargne').map(c=>({ id:c.id, amount:monthSpent[c.id]||0, hex:c.hex })).filter(s=>s.amount>0);
        const safeUrgTarget = Number(userGoals[urgId])||10000;
        const safeInvTarget = Number(userGoals[invId])||25000;

        return (
          <div className="px-5 pt-12 pb-4">
            {editingTx && (
              <div className="fixed inset-0 z-[200] bg-slate-900/50 backdrop-blur-sm flex items-end justify-center">
                <div className="bg-white rounded-t-3xl w-full max-w-md p-6 pb-10 shadow-2xl">
                  <div className="flex justify-between items-center mb-5">
                    <h3 className="font-bold text-lg text-slate-900">Modifier la dépense</h3>
                    <button onClick={()=>setEditingTx(null)} className="p-2 bg-slate-100 rounded-full"><Icon name="X" className="w-5 h-5 text-slate-500"/></button>
                  </div>
                  <form onSubmit={saveEdit} className="space-y-3">
                    <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                      <input type="number" step="0.01" inputMode="decimal" value={editForm.amount} onChange={e=>setEditForm({...editForm,amount:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-8 pr-4 text-right font-bold outline-none focus:border-indigo-400" required/>
                    </div>
                    <select value={editForm.categoryId} onChange={e=>setEditForm({...editForm,categoryId:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 font-medium outline-none focus:border-indigo-400">
                      {activeTemplate.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                    <input type="text" value={editForm.description} onChange={e=>setEditForm({...editForm,description:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 font-medium outline-none focus:border-indigo-400" placeholder="Note…"/>
                    <input type="date" value={editForm.date} onChange={e=>setEditForm({...editForm,date:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 font-medium outline-none focus:border-indigo-400" required/>
                    <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95">Enregistrer</button>
                  </form>
                </div>
              </div>
            )}

            {/* Patrimoine */}
            <h1 className="text-xl font-bold text-slate-900 mb-3">Mon Patrimoine</h1>
            <div className="grid grid-cols-2 gap-3 mb-8">
              {[{id:urgId,total:totalUrgence,target:safeUrgTarget,label:'Urgence',from:'from-violet-600',to:'to-violet-700',shadow:'shadow-violet-600/20',icon:'ShieldCheck'},{id:invId,total:totalInvest,target:safeInvTarget,label:'Investi',from:'from-emerald-600',to:'to-emerald-700',shadow:'shadow-emerald-600/20',icon:'TrendingUp'}].map(card=>(
                <div key={card.id} className={`bg-gradient-to-br ${card.from} ${card.to} rounded-2xl p-4 text-white shadow-lg ${card.shadow} relative overflow-hidden`}>
                  <div className="absolute top-0 right-0 w-16 h-16 bg-white/10 rounded-full blur-xl -mr-4 -mt-4"/>
                  <div className="flex items-center justify-between mb-2 opacity-90">
                    <Icon name={card.icon} className="w-4 h-4"/>
                    <span className="text-[9px] font-bold uppercase tracking-wider bg-white/20 px-2 py-0.5 rounded-full">{card.label}</span>
                  </div>
                  <p className="text-2xl font-light">${(card.total||0).toFixed(0)}</p>
                  <div className="mt-3">
                    <div className="w-full bg-black/20 rounded-full h-1.5 overflow-hidden"><div className="bg-white h-full rounded-full transition-all duration-1000" style={{width:`${Math.min(((card.total||0)/card.target)*100,100)}%`}}/></div>
                    <div className="flex justify-between mt-1 opacity-60">
                      <span className="text-[9px]">{Math.min(((card.total||0)/card.target)*100,100).toFixed(0)}%</span>
                      <span className="text-[9px]">${card.target.toLocaleString()}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Nav mois */}
            <div className="flex justify-between items-center mb-4">
              <div className="flex items-center space-x-2">
                <button onClick={goToPrevMonth} className="p-1.5 bg-white rounded-full shadow-sm text-slate-500 active:scale-95"><Icon name="ChevronLeft" className="w-4 h-4"/></button>
                <h2 className="text-base font-bold text-slate-800 capitalize w-32 text-center">{viewDate.toLocaleString('fr-CA',{month:'long',year:'numeric'})}</h2>
                <button onClick={goToNextMonth} className="p-1.5 bg-white rounded-full shadow-sm text-slate-500 active:scale-95"><Icon name="ChevronRight" className="w-4 h-4"/></button>
              </div>
              {!isCurrentMonth && <button onClick={goToCurrentMonth} className="text-indigo-600 text-xs font-semibold bg-indigo-50 px-3 py-1.5 rounded-full">Aujourd'hui</button>}
            </div>

            {/* Card résumé */}
            <div className="bg-slate-900 rounded-[1.75rem] p-5 text-white shadow-xl mb-6 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-28 h-28 bg-white/5 rounded-full blur-3xl -mr-8 -mt-8"/>
              <p className="text-slate-400 text-xs font-medium mb-1">Disponible (hors épargne)</p>
              <p className="text-4xl font-light tracking-tighter">${(reste||0).toFixed(2)}</p>
              <div className="mt-4 flex justify-between border-t border-white/10 pt-3">
                <div><p className="text-slate-400 text-[10px] uppercase tracking-wider mb-0.5">Budget dépenses</p><p className="text-emerald-400 text-sm font-medium flex items-center"><Icon name="ArrowUpRight" className="w-3 h-3 mr-1"/>${(budgetDep||0).toFixed(0)}</p></div>
                <div><p className="text-slate-400 text-[10px] uppercase tracking-wider mb-0.5 text-right">Taux d'épargne</p><p className="text-white text-sm font-medium flex items-center justify-end"><Icon name="TrendingUp" className="w-3 h-3 text-emerald-400 mr-1"/>{tauxEpargne}%</p></div>
              </div>
            </div>

            {/* Donut */}
            <div className="bg-white rounded-[1.75rem] p-5 border border-slate-50 shadow-sm mb-6">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 text-center">Répartition des dépenses</h3>
              <DonutChart data={donutData} totalSpent={spentDep}/>
              {donutData.length > 0 && (
                <div className="mt-4 flex flex-wrap gap-2 justify-center">
                  {activeTemplate.filter(c=>c.type!=='Épargne'&&(monthSpent[c.id]||0)>0).map(c=>(
                    <div key={c.id} className="flex items-center gap-1">
                      <div className="w-2 h-2 rounded-full" style={{background:c.hex}}/>
                      <span className="text-[10px] text-slate-500">{c.name}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Enveloppes */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">État des enveloppes</h3>
            <div className="space-y-2 mb-8">
              {activeTemplate.filter(c=>c.type!=='Épargne').map(cat=>{
                const alloc = monthEnv[cat.id]||0; const spent = monthSpent[cat.id]||0;
                if (alloc===0&&spent===0) return null;
                const rem = alloc-spent; const pct = alloc>0?(spent/alloc)*100:(spent>0?100:0);
                const color = rem<0?'bg-rose-500':pct>=85?'bg-orange-500':'bg-emerald-500';
                return (
                  <div key={cat.id} className="bg-white rounded-2xl p-4 border border-slate-50 shadow-sm">
                    <div className="flex justify-between items-center mb-2">
                      <div className="flex items-center">
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center mr-2.5 ${cat.light||'bg-slate-100'}`}><span className="text-[10px] font-bold">{cat.name.charAt(0)}</span></div>
                        <span className="font-semibold text-slate-800 text-sm">{cat.name}</span>
                      </div>
                      <div className="text-right">
                        <p className={`font-bold text-sm ${rem<0?'text-rose-600':'text-slate-900'}`}>${rem.toFixed(2)}</p>
                        <p className="text-[10px] text-slate-400">sur ${alloc.toFixed(0)}</p>
                      </div>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-1 overflow-hidden"><div className={`h-full rounded-full ${color} transition-all duration-700`} style={{width:`${Math.min(pct,100)}%`}}/></div>
                  </div>
                );
              })}
            </div>

            {/* Historique */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Historique</h3>
            <div className="space-y-2 mb-6">
              {timeline.length===0 ? (
                <p className="text-sm text-slate-400 text-center py-6 bg-white rounded-2xl border border-dashed border-slate-200">Aucune transaction ce mois-ci.</p>
              ) : timeline.map(item=>{
                const cat = item._type==='expense'?activeTemplate.find(c=>c.id===item.categoryId):null;
                const from = item._type==='transfer'?activeTemplate.find(c=>c.id===item.fromCategoryId):null;
                const to   = item._type==='transfer'?activeTemplate.find(c=>c.id===item.toCategoryId):null;
                const isIncome = item._type==='income';
                const isPayday = item._type==='payday';
                const isTransfer = item._type==='transfer';
                return (
                  <div key={item.id} className="bg-white rounded-2xl p-3.5 border border-slate-50 flex justify-between items-center shadow-sm">
                    <div className="flex items-center flex-1 overflow-hidden pr-2">
                      {isPayday&&<div className="w-9 h-9 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-3 shrink-0"><Icon name="Banknote" className="w-4 h-4"/></div>}
                      {isIncome&&<div className="w-9 h-9 rounded-full bg-teal-100 text-teal-600 flex items-center justify-center mr-3 shrink-0"><Icon name="PlusCircle" className="w-4 h-4"/></div>}
                      {isTransfer&&<div className="w-9 h-9 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center mr-3 shrink-0"><Icon name="ArrowRightLeft" className="w-4 h-4"/></div>}
                      {item._type==='expense'&&<div className={`w-9 h-9 rounded-full flex items-center justify-center mr-3 shrink-0 ${cat?.light||'bg-slate-100'}`}>{item.isFixed?<Icon name="Zap" className="w-3.5 h-3.5"/>:<span className="text-xs font-bold">{cat?.name?.charAt(0)||'?'}</span>}</div>}
                      <div className="truncate">
                        <p className="font-semibold text-slate-800 text-sm truncate">
                          {isPayday?'Jour de Paie':isIncome?`Revenu — ${activeTemplate.find(c=>c.id===Object.keys(item.splits||{})[0])?.name||'Enveloppe'}`:isTransfer?'Transfert de sécurité':(cat?.name||'Inconnu')}
                        </p>
                        <p className="text-[11px] text-slate-400 truncate">
                          {item.date?.split('-').reverse().join('/')}
                          {isTransfer&&` • De ${from?.name||'?'} → ${to?.name||'?'}`}
                          {item._type==='expense'&&item.description&&` • ${item.description}`}
                          {isIncome&&item.description&&` • ${item.description}`}
                        </p>
                      </div>
                    </div>
                    <div className="flex items-center space-x-1 pl-2 shrink-0">
                      <span className={`font-bold text-sm whitespace-nowrap mr-1 ${isPayday||isIncome?'text-emerald-500':isTransfer?'text-slate-400':'text-slate-900'}`}>
                        {isPayday||isIncome?'+':isTransfer?'↔ ':'-'}${(parseFloat(isPayday||isIncome?item.totalIncome:item.amount)||0).toFixed(2)}
                      </span>
                      {item._type==='expense'&&<button onClick={()=>openEdit(item)} className="p-1.5 text-slate-300 hover:text-indigo-500 rounded-lg"><Icon name="Edit2" className="w-3.5 h-3.5"/></button>}
                      <ConfirmDeleteButton onDelete={()=>{
                        if(isPayday||isIncome) setAllocations(p=>p.filter(a=>a.id!==item.id));
                        else if(isTransfer) setTransfers(p=>p.filter(t=>t.id!==item.id));
                        else setTransactions(p=>p.filter(t=>t.id!==item.id));
                      }}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // ── COACH VIEW ────────────────────────────────────────────────
      const CoachView = () => {
        const savingsCats = activeTemplate.filter(c => c.type === 'Épargne');
        const [y, m] = vmp.split('-').map(Number);
        const prevPrefix = new Date(y, m - 2, 1).toISOString().slice(0, 7);

        const catComparisons = activeTemplate.filter(c => c.type !== 'Épargne').map(c => {
          const cur  = transactions.filter(t => String(t.date).startsWith(vmp)     && t.categoryId === c.id).reduce((s,t)=>s+parseFloat(t.amount||0),0);
          const prev = transactions.filter(t => String(t.date).startsWith(prevPrefix) && t.categoryId === c.id).reduce((s,t)=>s+parseFloat(t.amount||0),0);
          return { cat: c, cur, prev, diff: prev > 0 ? cur - prev : null };
        }).filter(r => r.cur > 0 || r.prev > 0);

        const alertColors = { warning: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', icon: 'text-amber-500' }, danger: { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-800', icon: 'text-rose-500' }, success: { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', icon: 'text-emerald-500' }, info: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', icon: 'text-blue-500' } };

        return (
          <div className="px-5 pt-12 pb-4">
            <div className="flex items-center justify-between mb-5">
              <h1 className="text-xl font-bold text-slate-900 flex items-center">Coach <Icon name="Sparkles" className="w-4 h-4 ml-1.5 text-indigo-400"/></h1>
            </div>

            {/* Alertes */}
            {coachAlerts.length > 0 ? (
              <div className="space-y-3 mb-8">
                {coachAlerts.map((a, i) => {
                  const c = alertColors[a.type] || alertColors.info;
                  return (
                    <div key={i} className={`${c.bg} border ${c.border} rounded-2xl p-4 flex items-start gap-3`}>
                      <Icon name={a.icon} className={`w-5 h-5 shrink-0 mt-0.5 ${c.icon}`}/>
                      <p className={`text-sm ${c.text} leading-relaxed`}>{a.msg}</p>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="bg-slate-900 text-white rounded-[1.75rem] p-5 mb-6 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-20 h-20 bg-indigo-500/20 rounded-full blur-2xl -mr-6 -mt-6"/>
                <div className="flex items-center mb-2"><Icon name="BrainCircuit" className="w-5 h-5 text-indigo-400 mr-2"/><span className="font-bold text-white">Tout est sous contrôle !</span></div>
                <p className="text-sm text-slate-300 leading-relaxed">Aucune alerte pour ce mois-ci. Continue à saisir tes dépenses et le Coach t'avertira si quelque chose dépasse.</p>
              </div>
            )}

            {/* Graphique épargne */}
            <div className="bg-white rounded-[1.75rem] p-5 border border-slate-50 shadow-sm mb-5">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Évolution de l'épargne (6 mois)</h3>
              <SavingsChart allocations={allocations} transactions={transactions} categories={savingsCats}/>
            </div>

            {/* Graphique comparatif */}
            <div className="bg-white rounded-[1.75rem] p-5 border border-slate-50 shadow-sm mb-5">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Comparatif mois précédent</h3>
              <p className="text-[10px] text-slate-400 mb-3">Vert = tu as moins dépensé. Rouge = tu as plus dépensé.</p>
              <CompareChart transactions={transactions} categories={activeTemplate} viewMonthPrefix={vmp}/>
            </div>

            {/* Tableau comparatif textuel */}
            {catComparisons.length > 0 && (
              <div className="bg-white rounded-[1.75rem] p-5 border border-slate-50 shadow-sm mb-5">
                <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Détail vs mois dernier</h3>
                <div className="space-y-2">
                  {catComparisons.map(r => (
                    <div key={r.cat.id} className="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                      <div className="flex items-center">
                        <div className={`w-6 h-6 rounded-full flex items-center justify-center mr-2 ${r.cat.light||'bg-slate-100'}`}><span className="text-[9px] font-bold">{r.cat.name.charAt(0)}</span></div>
                        <span className="text-sm font-medium text-slate-700">{r.cat.name}</span>
                      </div>
                      <div className="text-right">
                        <span className="font-bold text-slate-900 text-sm">${r.cur.toFixed(0)}</span>
                        {r.diff !== null && (
                          <span className={`ml-2 text-xs font-bold ${r.diff>0?'text-rose-500':'text-emerald-500'}`}>
                            {r.diff>0?`+$${r.diff.toFixed(0)}`:`-$${Math.abs(r.diff).toFixed(0)}`}
                          </span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      };

      // ── SETTINGS VIEW ─────────────────────────────────────────────
      const SettingsView = () => {
        const [localTpl,  setLocalTpl]  = useState(activeTemplate.reduce((a,c)=>({...a,[c.id]:c.defaultSplit||0}),{}));
        const [localGoals,setLocalGoals]= useState({[urgId]:userGoals[urgId]||10000,[invId]:userGoals[invId]||25000});
        const [feName,    setFeName]    = useState('');
        const [feAmt,     setFeAmt]     = useState('');
        const [feCat,     setFeCat]     = useState(activeTemplate.filter(c=>c.type!=='Épargne')[0]?.id||'');
        const [editCats,  setEditCats]  = useState(false);
        const [newName,   setNewName]   = useState('');
        const [newType,   setNewType]   = useState('Variable');
        const [newColor,  setNewColor]  = useState(PALETTE[0]);

        const save = () => {
          setUserTemplate(localTpl);
          setUserGoals({[urgId]:parseFloat(localGoals[urgId])||10000,[invId]:parseFloat(localGoals[invId])||25000});
          alert('Paramètres sauvegardés !');
        };

        const addFixed = () => {
          if (!feName||!feAmt||!feCat) return;
          setFixedExpenses(p=>[...p,{id:Date.now().toString(),name:feName,amount:parseFloat(feAmt)||0,categoryId:feCat}]);
          setFeName(''); setFeAmt('');
        };

        const addCat = () => {
          if (!newName) return;
          const nc = {id:Date.now().toString(),name:newName,type:newType,defaultSplit:0,hex:newColor.hex,light:newColor.light};
          setCustomCategories(p=>[...p,nc]);
          setLocalTpl(p=>({...p,[nc.id]:0}));
          setNewName('');
        };

        const delCat = id => {
          if (window.confirm('Supprimer cette enveloppe ?')) {
            setCustomCategories(p=>p.filter(c=>c.id!==id));
            setFixedExpenses(p=>p.filter(f=>f.categoryId!==id));
          }
        };

        const exportCSV = () => {
          let csv = "Date\tMontant\tCatégorie\tDescription\n";
          transactions.forEach(t => { const n = activeTemplate.find(c=>c.id===t.categoryId)?.name||'?'; csv+=`${t.date}\t${t.amount||0}\t${n}\t${t.description||''}\n`; });
          const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='Budget_Export.csv'; a.click();
        };

        const exportJSON = () => {
          const data = { fintech_categories:customCategories, fintech_transactions:transactions, fintech_allocations:allocations, fintech_transfers:transfers, fintech_template:userTemplate, fintech_goals:userGoals, fintech_fixed_expenses:fixedExpenses };
          const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download=`Budget_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        };

        if (editCats) return (
          <div className="px-5 pt-12 pb-4">
            <div className="flex items-center mb-6">
              <button onClick={()=>setEditCats(false)} className="p-2 mr-2 bg-slate-200 rounded-full active:scale-95"><Icon name="ChevronLeft" className="w-5 h-5"/></button>
              <h1 className="text-xl font-bold text-slate-900">Mes Enveloppes</h1>
            </div>
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-50 mb-6">
              <p className="text-xs font-bold text-slate-500 uppercase mb-3">Créer une enveloppe</p>
              <input placeholder="Nom (ex: Essence, Animaux…)" value={newName} onChange={e=>setNewName(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-3 text-sm font-medium outline-none mb-3 focus:border-indigo-400"/>
              <select value={newType} onChange={e=>setNewType(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-3 text-sm font-medium outline-none mb-3 focus:border-indigo-400">
                <option value="Variable">Variable</option><option value="Fixe">Fixe</option><option value="Épargne">Épargne</option>
              </select>
              <div className="flex flex-wrap gap-2 mb-3">
                {PALETTE.map(p=>(
                  <button key={p.hex} type="button" onClick={()=>setNewColor(p)} className={`w-7 h-7 rounded-full transition-transform ${newColor.hex===p.hex?'ring-2 ring-offset-1 ring-slate-400 scale-110':''}`} style={{background:p.hex}}/>
                ))}
              </div>
              <button onClick={addCat} className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm active:scale-95">Ajouter</button>
            </div>
            <div className="space-y-2">
              {customCategories.map(c=>(
                <div key={c.id} className="bg-white p-3.5 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                  <div className="flex items-center">
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center mr-2.5 ${c.light||'bg-slate-100'}`}><span className="text-[10px] font-bold">{c.name.charAt(0)}</span></div>
                    <div><p className="font-semibold text-slate-800 text-sm">{c.name}</p><p className="text-[10px] text-slate-400 uppercase tracking-wide">{c.type}</p></div>
                  </div>
                  {c.id!==urgId&&c.id!==invId&&<button onClick={()=>delCat(c.id)} className="p-1.5 text-rose-400 hover:bg-rose-50 rounded-lg"><Icon name="Trash2" className="w-4 h-4"/></button>}
                </div>
              ))}
            </div>
          </div>
        );

        return (
          <div className="px-5 pt-12 pb-4">
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-xl font-bold text-slate-900">Paramètres</h1>
              <button onClick={save} className="flex items-center text-xs font-bold px-4 py-2 rounded-full bg-slate-900 text-white active:scale-95">
                <Icon name="Save" className="w-3 h-3 mr-1.5"/>Sauvegarder
              </button>
            </div>

            <button onClick={()=>setEditCats(true)} className="w-full bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-6 flex justify-between items-center active:scale-95">
              <div className="flex items-center">
                <div className="w-9 h-9 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mr-3"><Icon name="Tag" className="w-4 h-4"/></div>
                <div className="text-left"><p className="font-bold text-indigo-900 text-sm">Gérer mes enveloppes</p><p className="text-xs text-indigo-600/70 mt-0.5">Ajouter, supprimer, couleurs</p></div>
              </div>
              <Icon name="ChevronRight" className="w-4 h-4 text-indigo-400"/>
            </button>

            {/* Checklist fixe */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center"><Icon name="Zap" className="w-3.5 h-3.5 mr-1.5"/>Charges fixes</h3>
            <div className="bg-white rounded-2xl p-4 border border-slate-50 shadow-sm mb-6">
              {fixedExpenses.map(fe=>(
                <div key={fe.id} className="flex justify-between items-center border-b border-slate-50 py-2 last:border-0">
                  <div><p className="font-bold text-slate-800 text-sm">{fe.name}</p><p className="text-[10px] text-slate-400">{activeTemplate.find(c=>c.id===fe.categoryId)?.name||'—'}</p></div>
                  <div className="flex items-center gap-3"><span className="font-bold text-sm">${(parseFloat(fe.amount)||0).toFixed(2)}</span><button onClick={()=>setFixedExpenses(p=>p.filter(f=>f.id!==fe.id))} className="text-slate-300 hover:text-rose-500 p-1"><Icon name="Trash2" className="w-3.5 h-3.5"/></button></div>
                </div>
              ))}
              <div className="mt-3 bg-slate-50 rounded-xl p-3 border border-slate-100">
                <input placeholder="Nom (ex: Netflix)" value={feName} onChange={e=>setFeName(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none mb-2 focus:border-indigo-400"/>
                <div className="flex gap-2 mb-2">
                  <div className="relative w-1/3"><span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span><input type="number" inputMode="decimal" placeholder="0" value={feAmt} onChange={e=>setFeAmt(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg py-2 pl-5 pr-2 text-sm font-bold outline-none focus:border-indigo-400"/></div>
                  <select value={feCat} onChange={e=>setFeCat(e.target.value)} className="flex-1 bg-white border border-slate-200 rounded-lg py-2 px-2 text-sm outline-none focus:border-indigo-400">
                    {activeTemplate.filter(c=>c.type!=='Épargne').map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <button onClick={addFixed} className="w-full bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-sm hover:bg-slate-300 active:scale-95">Ajouter</button>
              </div>
            </div>

            {/* Objectifs */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Objectifs patrimoine</h3>
            <div className="bg-white rounded-2xl p-2 border border-slate-50 shadow-sm mb-6">
              {[{id:urgId,label:'Urgence',icon:'ShieldCheck',color:'text-violet-500'},{id:invId,label:'Investissements',icon:'TrendingUp',color:'text-emerald-500'}].map(g=>(
                <div key={g.id} className="p-3 flex justify-between items-center border-b border-slate-50 last:border-0">
                  <div className="flex items-center"><Icon name={g.icon} className={`w-4 h-4 ${g.color} mr-2`}/><span className="text-sm font-medium text-slate-700">{g.label}</span></div>
                  <div className="relative w-24"><span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span><input type="number" inputMode="decimal" value={localGoals[g.id]||''} onChange={e=>setLocalGoals({...localGoals,[g.id]:e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl py-1.5 pl-6 pr-2 text-right font-semibold text-slate-900 text-sm outline-none focus:border-indigo-400"/></div>
                </div>
              ))}
            </div>

            {/* Modèle paie */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Modèle de paie</h3>
            <div className="bg-white rounded-2xl p-2 border border-slate-50 shadow-sm mb-6">
              {activeTemplate.map((c,i)=>(
                <div key={c.id} className={`p-3 flex justify-between items-center ${i<activeTemplate.length-1?'border-b border-slate-50':''}`}>
                  <span className="text-sm font-medium text-slate-700 flex-1">{c.name}</span>
                  <div className="relative" style={{width:'5.5rem'}}><span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span><input type="number" inputMode="decimal" value={localTpl[c.id] !== undefined ? localTpl[c.id] : ''} onChange={e=>setLocalTpl({...localTpl,[c.id]:e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl py-1.5 pl-6 pr-2 text-right font-semibold text-slate-900 text-sm outline-none focus:border-emerald-400"/></div>
                </div>
              ))}
            </div>

            {/* Export */}
            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Données</h3>
            <div className="bg-white rounded-2xl p-4 border border-slate-50 shadow-sm mb-4 space-y-3">
              <button onClick={exportCSV} className="w-full bg-slate-100 text-slate-800 font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-slate-200 active:scale-[0.98]"><Icon name="FileText" className="w-4 h-4"/>Exporter en CSV</button>
              <button onClick={exportJSON} className="w-full bg-indigo-50 text-indigo-800 font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-indigo-100 active:scale-[0.98]"><Icon name="Download" className="w-4 h-4"/>Sauvegarde JSON complète</button>
            </div>
          </div>
        );
      };

      // ── RENDER ────────────────────────────────────────────────────
      return (
        <div style={{ height:'100%', width:'100%', background:'#F7F7F9', display:'flex', justifyContent:'center', overflow:'hidden' }}>
          <div style={{ width:'100%', maxWidth:480, position:'relative', height:'100%', overflow:'hidden' }}>

            <div className="main-scroll hide-scrollbar">
              {activeTab==='dashboard' && <DashboardView/>}
              {activeTab==='coach'     && <CoachView/>}
              {activeTab==='add'       && <AddTransactionView/>}
              {activeTab==='settings'  && <SettingsView/>}
            </div>

            {/* ── BOTTOM NAV (FIXED, iOS-safe) ── */}
            <div className="nav-bar">
              <div className="nav-inner">
                <button onClick={()=>setActiveTab('dashboard')} className={`transition-all ${activeTab==='dashboard'?'text-slate-900 scale-110':'text-slate-400'}`}>
                  <Icon name="LayoutGrid" className="w-6 h-6" strokeWidth={activeTab==='dashboard'?2.5:2}/>
                </button>
                <button onClick={()=>setActiveTab('coach')} className={`transition-all ${activeTab==='coach'?'text-slate-900 scale-110':'text-slate-400'}`}>
                  <Icon name="Sparkles" className="w-6 h-6" strokeWidth={activeTab==='coach'?2.5:2}/>
                </button>
                <button
                  onClick={()=>{setActiveTab('add');setViewDate(new Date());}}
                  className="bg-slate-900 text-white rounded-full p-4 shadow-lg shadow-slate-900/30 active:scale-95 border-[5px] border-[#F7F7F9]"
                  style={{ marginTop: '-2.5rem' }}
                >
                  <Icon name="Plus" className="w-6 h-6" strokeWidth={3}/>
                </button>
                <button onClick={()=>setActiveTab('settings')} className={`transition-all ${activeTab==='settings'?'text-slate-900 scale-110':'text-slate-400'}`}>
                  <Icon name="MoreHorizontal" className="w-6 h-6" strokeWidth={activeTab==='settings'?2.5:2}/>
                </button>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
